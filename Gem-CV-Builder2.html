<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Blue Resume Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        /* Custom scrollbar for Webkit to match the Ice theme */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #0ea5e9; 
        }
    </style>
</head>
<!-- Changing body bg to a very dark slate (almost black-blue) -->
<body class="bg-slate-950 text-slate-100 min-h-screen flex justify-center py-10 px-4">
    
    <!-- Added a cyan border and shadow glow for the Ice effect -->
    <div class="container max-w-2xl bg-slate-900 p-6 rounded-xl shadow-2xl border border-slate-800 shadow-cyan-900/50">
        
        <div class="text-center border-b border-slate-800 pb-6 mb-6">
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-sky-500">
                Interactive Resume Builder
            </h1>
            <p class="text-slate-400 text-sm mt-2">Ice Blue Edition</p>
        </div>
        
        <form id="resumeForm" class="space-y-5">
            <!-- Name & Title Group -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="name" class="block text-sm font-medium mb-1 text-cyan-100">Name</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe" 
                           class="block w-full p-3 text-sm text-white bg-slate-800 border border-slate-700 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all placeholder-slate-500">
                </div>
                <div>
                    <label for="title" class="block text-sm font-medium mb-1 text-cyan-100">Job Title</label>
                    <input type="text" id="title" name="title" placeholder="Software Engineer" 
                           class="block w-full p-3 text-sm text-white bg-slate-800 border border-slate-700 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all placeholder-slate-500">
                </div>
            </div>

            <!-- Contact Info Group -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="email" class="block text-sm font-medium mb-1 text-cyan-100">Email</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" 
                           class="block w-full p-3 text-sm text-white bg-slate-800 border border-slate-700 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all placeholder-slate-500">
                </div>
                <div>
                    <label for="phone" class="block text-sm font-medium mb-1 text-cyan-100">Phone</label>
                    <input type="tel" id="phone" name="phone" placeholder="(555) 123-4567" 
                           class="block w-full p-3 text-sm text-white bg-slate-800 border border-slate-700 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all placeholder-slate-500">
                </div>
            </div>

            <!-- Address -->
            <div>
                <label for="address" class="block text-sm font-medium mb-1 text-cyan-100">Address</label>
                <textarea id="address" name="address" rows="2" 
                          class="block w-full p-3 text-sm text-white bg-slate-800 border border-slate-700 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all"></textarea>
            </div>

            <!-- Objective -->
            <div>
                <label for="objective" class="block text-sm font-medium mb-1 text-cyan-100">Professional Objective</label>
                <textarea id="objective" name="objective" rows="3" 
                          class="block w-full p-3 text-sm text-white bg-slate-800 border border-slate-700 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all"></textarea>
            </div>

            <!-- Education -->
            <div>
                <label for="education" class="block text-sm font-medium mb-1 text-cyan-100">Education</label>
                <textarea id="education" name="education" rows="3" placeholder="University Name - Degree&#10;Year Graduated"
                          class="block w-full p-3 text-sm text-white bg-slate-800 border border-slate-700 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all placeholder-slate-600"></textarea>
            </div>

            <!-- Experience -->
            <div>
                <label for="experience" class="block text-sm font-medium mb-1 text-cyan-100">Work Experience</label>
                <textarea id="experience" name="experience" rows="4" placeholder="Job Title - Company&#10;- Responsibility 1&#10;- Responsibility 2"
                          class="block w-full p-3 text-sm text-white bg-slate-800 border border-slate-700 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all placeholder-slate-600"></textarea>
            </div>

            <!-- Skills -->
            <div>
                <label for="skills" class="block text-sm font-medium mb-1 text-cyan-100">Skills</label>
                <textarea id="skills" name="skills" rows="3" placeholder="HTML, CSS, JavaScript, Teamwork..."
                          class="block w-full p-3 text-sm text-white bg-slate-800 border border-slate-700 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all placeholder-slate-600"></textarea>
            </div>

            <!-- Certifications -->
            <div>
                <label for="certifications" class="block text-sm font-medium mb-1 text-cyan-100">Certifications</label>
                <textarea id="certifications" name="certifications" rows="2" 
                          class="block w-full p-3 text-sm text-white bg-slate-800 border border-slate-700 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all"></textarea>
            </div>

            <!-- Button with Ice Blue Gradient -->
            <button type="submit" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold py-3 px-4 rounded-lg shadow-lg shadow-cyan-500/30 transform transition hover:-translate-y-0.5 duration-200">
                Generate Resume
            </button>
        </form>

        <!-- Resume Output Area -->
        <div id="output-area" class="mt-8 hidden animate-fade-in">
            <h2 class="text-2xl font-bold mb-4 text-cyan-400 border-b border-slate-800 pb-2">Result:</h2>
            
            <!-- White paper look for the resume itself -->
            <div id="generated-resume" class="bg-slate-50 text-slate-800 p-8 rounded shadow-xl">
                <!-- Resume content injected here -->
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('resumeForm');
        const generatedResume = document.getElementById('generated-resume');
        const outputArea = document.getElementById('output-area');

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const getVal = (id) => document.getElementById(id).value;
            const formatText = (text) => text.replace(/\n/g, '<br>');

            const name = getVal('name');
            const title = getVal('title');
            const email = getVal('email');
            const phone = getVal('phone');
            const address = getVal('address');
            const objective = getVal('objective');
            const education = getVal('education');
            const experience = getVal('experience');
            const skills = getVal('skills');
            const certifications = getVal('certifications');

            // I styled the generated resume to use Slate/Blue headers to match the theme
            const resume = `
                <div class="border-b-4 border-sky-600 pb-4 mb-6">
                    <h1 class="text-4xl font-extrabold text-slate-900 uppercase tracking-wide">${name}</h1>
                    <h2 class="text-2xl text-sky-600 font-semibold mt-1">${title}</h2>
                    <div class="text-sm text-slate-500 mt-3 font-medium flex flex-wrap gap-3">
                        ${email ? `<span>📧 ${email}</span>` : ''}
                        ${phone ? `<span>📱 ${phone}</span>` : ''}
                        ${address ? `<span>📍 ${address}</span>` : ''}
                    </div>
                </div>

                ${objective ? `
                <div class="mb-5">
                    <h3 class="text-lg font-bold text-sky-700 uppercase tracking-wider mb-2 border-b border-slate-200">Objective</h3>
                    <p class="text-slate-700 leading-relaxed">${formatText(objective)}</p>
                </div>` : ''}

                ${experience ? `
                <div class="mb-5">
                    <h3 class="text-lg font-bold text-sky-700 uppercase tracking-wider mb-2 border-b border-slate-200">Experience</h3>
                    <p class="text-slate-700 leading-relaxed">${formatText(experience)}</p>
                </div>` : ''}

                ${education ? `
                <div class="mb-5">
                    <h3 class="text-lg font-bold text-sky-700 uppercase tracking-wider mb-2 border-b border-slate-200">Education</h3>
                    <p class="text-slate-700 leading-relaxed">${formatText(education)}</p>
                </div>` : ''}

                ${skills ? `
                <div class="mb-5">
                    <h3 class="text-lg font-bold text-sky-700 uppercase tracking-wider mb-2 border-b border-slate-200">Skills</h3>
                    <p class="text-slate-700 leading-relaxed">${formatText(skills)}</p>
                </div>` : ''}

                ${certifications ? `
                <div class="mb-5">
                    <h3 class="text-lg font-bold text-sky-700 uppercase tracking-wider mb-2 border-b border-slate-200">Certifications</h3>
                    <p class="text-slate-700 leading-relaxed">${formatText(certifications)}</p>
                </div>` : ''}
            `;

            generatedResume.innerHTML = resume;
            outputArea.classList.remove('hidden');
            outputArea.scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
